<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هلا دوريانا - إدارة الدوريات</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #EEE;
            direction: rtl;
            unicode-bidi: embed;
        }

        .main-content {
            padding: 20px;
        }

        .card {
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .match-card {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            direction: rtl;
            text-align: right;
            border-right: 4px solid #0d6efd;
        }
    </style>
</head>

<body>

<div class="main-content">

    <!-- إدارة المباريات -->
    <div class="card">
        <div class="card-header bg-primary text-white">
            تسجيل مباراة
        </div>

        <div class="card-body">
            <div class="row g-2">

                <div class="col-md-2">
                    <input type="number" id="matchNumber" class="form-control" placeholder="رقم المباراة">
                </div>

                <div class="col-md-3">
                    <select id="matchTeam1" class="form-select"></select>
                </div>

                <div class="col-md-1">
                    <input type="number" id="score1" class="form-control" value="0">
                </div>

                <div class="col-md-1 text-center">VS</div>

                <div class="col-md-1">
                    <input type="number" id="score2" class="form-control" value="0">
                </div>

                <div class="col-md-3">
                    <select id="matchTeam2" class="form-select"></select>
                </div>

                <div class="col-md-2">
                    <input type="date" id="matchDate" class="form-control">
                </div>

                <div class="col-12">
                    <button class="btn btn-primary w-100" onclick="addMatch()">حفظ المباراة</button>
                </div>

            </div>
        </div>
    </div>

    <!-- سجل المباريات -->
    <div class="card">
        <div class="card-header">
            سجل المباريات
        </div>

        <div id="matchesHistory" class="card-body"></div>
    </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem('halaDoryana_v4')) || {
    teams: [
        {name: "الهلال"}, 
        {name: "المريخ"}
    ],
    matches: []
};

function saveData() {
    localStorage.setItem('halaDoryana_v4', JSON.stringify(data));
    render();
}

// تعبئة الفرق
function renderTeams() {
    const options = '<option value="">اختر الفريق</option>' +
        data.teams.map(t => `<option value="${t.name}">${t.name}</option>`).join('');

    document.getElementById('matchTeam1').innerHTML = options;
    document.getElementById('matchTeam2').innerHTML = options;
}

// إضافة مباراة
function addMatch() {

    const matchNumber = document.getElementById('matchNumber').value;
    const t1 = document.getElementById('matchTeam1').value;
    const t2 = document.getElementById('matchTeam2').value;
    const s1 = parseInt(document.getElementById('score1').value) || 0;
    const s2 = parseInt(document.getElementById('score2').value) || 0;
    const date = document.getElementById('matchDate').value;

    if (!matchNumber) return alert("أدخل رقم المباراة");
    if (!t1 || !t2 || t1 === t2) return alert("اختيار الفرق غير صحيح");

    // منع التكرار
    if (data.matches.some(m => m.matchNumber == matchNumber && m.date == date)) {
        return alert("رقم المباراة موجود في نفس اليوم");
    }

    data.matches.push({
        id: Date.now(),
        matchNumber,
        t1, t2, s1, s2,
        date: date || new Date().toISOString().split('T')[0]
    });

    document.getElementById('matchNumber').value = '';
    saveData();
}

// عرض المباريات
function renderMatches() {
    document.getElementById('matchesHistory').innerHTML =
        data.matches.map(m => `
            <div class="match-card d-flex justify-content-between">
                <span>
                    <strong>#${m.matchNumber}</strong> |
                    <strong>${m.t1}</strong> ${m.s1} - ${m.s2} <strong>${m.t2}</strong>
                </span>
                <small>${m.date}</small>
            </div>
        `).join('');
}

function render() {
    renderTeams();
    renderMatches();
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('matchDate').value =
        new Date().toISOString().split('T')[0];
    render();
});
</script>

</body>
</html>
